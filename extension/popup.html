<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body { width: 260px; margin: 0; font: 14px/1.4 -apple-system, Segoe UI, Roboto, sans-serif; color: #111827; }
      .head { background: #111827; color: #fff; padding: 12px 14px; font-weight: 600; }
      .body { padding: 14px; display: flex; flex-direction: column; gap: 10px; }
      label { font-size: 12px; color: #6b7280; }
      input { width: 100%; box-sizing: border-box; padding: 8px; border: 1px solid #d1d5db; border-radius: 8px; font: inherit; }
      button { padding: 8px; border: 1px solid #d1d5db; background: #fff; border-radius: 8px; font: inherit; font-weight: 600; cursor: pointer; }
      button.primary { background: #111827; color: #fff; border-color: #111827; }
      .row { display: flex; gap: 8px; }
      .row button { flex: 1; }
      .status { font-size: 12px; color: #6b7280; min-height: 16px; }
      .status.ok { color: #166534; }
      .status.err { color: #b91c1c; }
    </style>
  </head>
  <body>
    <div class="head">FDE · Live Translate</div>
    <div class="body">
      <div>
        <label>Backend (Node gateway) URL</label>
        <input id="apiUrl" placeholder="http://localhost:8787" />
      </div>
      <div class="row">
        <button id="save">Save</button>
        <button id="health">Check backend</button>
      </div>
      <button id="page" class="primary">Translate this page</button>
      <button id="restore">Restore page</button>
      <div id="status" class="status"></div>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
